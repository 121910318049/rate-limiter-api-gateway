server:
  port: 8080

spring:
  application:
    name: api-gateway

  datasource:
    url: jdbc:postgresql://localhost:5432/ratelimiter
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

downstream:
  service:
    url: http://localhost:8081

rate-limit:
  default:
    max-requests: 60
    window-seconds: 60

logging:
  level:
    com.ratelimiter: DEBUG
    org.springframework.data.redis: DEBUG
